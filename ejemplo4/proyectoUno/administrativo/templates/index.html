
<h3>Número de estudiantes {{ numero_estudiantes }}</h3>

<ul>
 {% for e in estudiantes %}

  <li>
    {{e}} - [<a href="{% url 'obtener_estudiante' e.id %}">ver</a>] - 
    [<a href="{% url 'editar_estudiante' e.id %}">editar</a>] -
    [<a href="{% url 'eliminar_estudiante' e.id %}" 
      onclick="return confirm('¿Está seguro de la eliminación?')" >
      eliminar</a>]
  </li>

{% endfor %} 
</ul>
<h2>Listado de Paises</h2>

<ul>
{% for e in pais %}
  <li>
    {{e}} - [<a href="{% url 'obtener_pais' e.id %}">ver</a>]
  </li>
{% endfor %}
</ul>
